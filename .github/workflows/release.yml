name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        type: string
      changelog:
        description: 'Changelog for this release'
        required: false
        type: string

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm ci

      - name: Build JS assets
        run: npm run build

      - name: Update version in plugin header
        run: |
          sed -i "s/Version: .*/Version: ${{ github.event.inputs.version }}/" dog-park-recommendations.php
          sed -i "s/DOGPARK_VERSION', '.*'/DOGPARK_VERSION', '${{ github.event.inputs.version }}'/" dog-park-recommendations.php

      - name: Create release zip
        run: |
          mkdir -p dist
          ZIP_NAME="skilitsa-park-visits-${{ github.event.inputs.version }}.zip"
          # Create zip from working directory (includes version updates)
          zip -r "dist/${ZIP_NAME}" . -x "dist/*" ".git/*" ".github/*" "node_modules/*" "vendor/*" "*.log" "*.zip" "composer.json" "package*.json" "readme.txt" "dog-park-best-hour/*"
          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: Version ${{ github.event.inputs.version }}
          body: ${{ github.event.inputs.changelog }}
          files: dist/*.zip
          draft: false
          prerelease: false