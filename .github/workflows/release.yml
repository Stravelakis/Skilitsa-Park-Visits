name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        type: string
      changelog:
        description: 'Changelog for this release'
        required: false
        type: string

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm ci

      - name: Build JS assets
        run: npm run build

      - name: Verify build output
        run: |
          ls -la build/
          ls -la blocks/dog-park-best-hour/
          ls -la blocks/visitor-form/

      - name: Update version in plugin header
        run: |
          sed -i "s/Version: .*/Version: ${{ github.event.inputs.version }}/" dog-park-recommendations.php
          sed -i "s/DOGPARK_VERSION', '.*'/DOGPARK_VERSION', '${{ github.event.inputs.version }}'/" dog-park-recommendations.php

      - name: Create release zip
        run: |
          mkdir -p dist
          ZIP_NAME="skilitsa-park-visits-${{ github.event.inputs.version }}.zip"
          # Create zip from working directory with proper folder structure
          cd ..
          zip -r "Skilitsa-Park-Visits/dist/${ZIP_NAME}" "Skilitsa-Park-Visits" \
            -x "Skilitsa-Park-Visits/dist/*" \
            "Skilitsa-Park-Visits/.git/*" \
            "Skilitsa-Park-Visits/.github/*" \
            "Skilitsa-Park-Visits/node_modules/*" \
            "Skilitsa-Park-Visits/vendor/*" \
            "Skilitsa-Park-Visits/*.log" \
            "Skilitsa-Park-Visits/*.zip" \
            "Skilitsa-Park-Visits/composer.json" \
            "Skilitsa-Park-Visits/package*.json" \
            "Skilitsa-Park-Visits/readme.txt" \
            "Skilitsa-Park-Visits/dog-park-best-hour/*"
          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: Version ${{ github.event.inputs.version }}
          body: ${{ github.event.inputs.changelog }}
          files: dist/*.zip
          draft: false
          prerelease: false